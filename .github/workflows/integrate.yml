name: Integrate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run lint
  prebuild:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: x64
            flags: -D ANDROID_STL=c++_shared
          - os: ubuntu-24.04
            platform: android
            arch: ia32
            flags: -D ANDROID_STL=c++_shared
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: ubuntu-24.04
            platform: android
            arch: arm
            flags: -D ANDROID_STL=c++_shared
          - os: macos-15
            platform: darwin
            arch: x64
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: macos-15
            platform: ios
            arch: arm64
          - os: macos-15
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-15
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: windows-2022
            platform: win32
            arch: x64
          - os: windows-2022
            platform: win32
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Build / ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - run: sudo apt install -y nasm
        if: ${{ matrix.platform == 'linux' || matrix.platform == 'android' }}
      - run: pip3 install meson
        if: ${{ matrix.platform == 'linux' || matrix.platform == 'android' }}
      - run: brew install meson nasm llvm@20
        if: ${{ matrix.platform == 'darwin' || matrix.platform == 'ios' }}
      - run: choco upgrade llvm
        if: ${{ matrix.platform == 'win32' }}
      - run: choco install --ignore-package-exit-codes meson nasm msys2
        if: ${{ matrix.platform == 'win32' }}
      - run: pacman --noconfirm -S git make ninja pkgconf nasm
        shell: C:\tools\msys64\usr\bin\bash.exe -e {0}
        env:
          PATH: C:\tools\msys64\usr\bin
        if: ${{ matrix.platform == 'win32' }}
      - uses: holepunchto/actions/compile-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          tags: ${{ matrix.tags}}
          flags: --debug ${{ matrix.flags }}
          upload: true
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            flags: --sanitize address
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: sudo apt install -y nasm
        if: ${{ matrix.platform == 'linux' }}
      - run: pip3 install meson
        if: ${{ matrix.platform == 'linux' }}
      - run: brew install meson nasm llvm@20
        if: ${{ matrix.platform == 'darwin' }}
      - run: choco upgrade llvm
        if: ${{ matrix.platform == 'win32' }}
      - run: choco install --ignore-package-exit-codes meson nasm msys2
        if: ${{ matrix.platform == 'win32' }}
      - run: pacman --noconfirm -S git make ninja pkgconf nasm
        shell: C:\tools\msys64\usr\bin\bash.exe -e {0}
        env:
          PATH: C:\tools\msys64\usr\bin
        if: ${{ matrix.platform == 'win32' }}
      - uses: holepunchto/actions/compile-bare@9a12adc5ba9e863f8e6572ef0d0475326137e959
        with:
          flags: --debug ${{ matrix.flags }}
      - uses: holepunchto/actions/compile-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          flags: --debug ${{ matrix.flags }}
      - run: npm test
        env:
          LSAN_OPTIONS: suppressions=test/leaks.txt
